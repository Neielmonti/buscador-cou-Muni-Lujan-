<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa Polígonos COU - Luján</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        /* Que el mapa ocupe toda la pantalla */
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; } 
    </style>
</head>
<body>
    <div id="map"></div> <script>
        // 1. Inicializar el mapa centrado en Luján [cite: 69]
        const map = L.map('map').setView([-34.5701, -59.1051], 13); // [cite: 69]

        // 2. Agregar la capa base de OpenStreetMap [cite: 70, 71, 73]
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors' // [cite: 72]
        }).addTo(map);

        // 3. Embeber la capa WMS del municipio (Polígonos COU) [cite: 74, 75, 81]
        const wmsLayer = L.tileLayer.wms('https://mapas.lujan.gob.ar/geoserver/muni/wms', { // [cite: 75]
            layers: 'muni:poligonos_cou', // [cite: 76]
            format: 'image/png', // [cite: 77]
            transparent: true, // [cite: 78]
            version: '1.3.0', // [cite: 79]
            attribution: 'Municipalidad de Luján' // [cite: 80]
        }).addTo(map);

        // 4. Funcionalidad: Clic en el lugar y obtener info (GetFeatureInfo) [cite: 47]
        map.on('click', function(e) {
            const bounds = map.getBounds();
            const size = map.getSize();
            
            // En WMS 1.3.0 el BBOX usa orden lat, lon, lat, lon para EPSG:4326 [cite: 43]
            const bbox = `${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()}`;

            // Construir la URL con todos los parámetros obligatorios [cite: 48]
            const url = new URL('https://mapas.lujan.gob.ar/geoserver/muni/wms'); // [cite: 50]
            url.searchParams.append('SERVICE', 'WMS'); // [cite: 51]
            url.searchParams.append('VERSION', '1.3.0'); // [cite: 52]
            url.searchParams.append('REQUEST', 'GetFeatureInfo'); // [cite: 53]
            url.searchParams.append('LAYERS', 'muni:poligonos_cou'); // [cite: 54]
            url.searchParams.append('QUERY_LAYERS', 'muni:poligonos_cou'); // [cite: 55]
            url.searchParams.append('CRS', 'EPSG:4326'); // [cite: 56]
            url.searchParams.append('BBOX', bbox); // [cite: 57]
            url.searchParams.append('WIDTH', size.x); // [cite: 58]
            url.searchParams.append('HEIGHT', size.y); // [cite: 59]
            url.searchParams.append('I', Math.round(e.containerPoint.x)); // Coordenada X del clic [cite: 48, 60]
            url.searchParams.append('J', Math.round(e.containerPoint.y)); // Coordenada Y del clic [cite: 48, 61]
            url.searchParams.append('INFO_FORMAT', 'application/json'); // Formato de respuesta 

            // Hacer la petición asíncrona al servidor
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error("Error al consultar GeoServer");
                    return response.json();
                })
                .then(data => {
                    if (data.features && data.features.length > 0) {
                        const atributos = data.features[0].properties;
                        // Mostrar los datos crudos en un popup temporalmente
                        L.popup()
                            .setLatLng(e.latlng)
                            .setContent(`<pre>${JSON.stringify(atributos, null, 2)}</pre>`)
                            .openOn(map);
                    } else {
                        L.popup()
                            .setLatLng(e.latlng)
                            .setContent("No se encontró información en este punto.")
                            .openOn(map);
                    }
                })
                .catch(error => {
                    console.error('Error de red o CORS:', error);
                    L.popup()
                        .setLatLng(e.latlng)
                        .setContent("Error al consultar la capa. Ver consola (F12).")
                        .openOn(map);
                });
        });
    </script>
</body>
</html>
